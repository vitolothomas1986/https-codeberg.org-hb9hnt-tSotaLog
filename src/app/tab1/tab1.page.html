<ion-header>
  <ion-toolbar>
    <ion-title>
      {{ this.logType }} Log
    </ion-title>
  </ion-toolbar>
</ion-header>

<ion-card>
  <ion-card-content>
    <ion-grid>
     <ion-row class="ion-align-items-stretch">
        <ion-col>
          <ion-input 
            *ngIf="logType == 'Chaser'; else otherLog"
            [(ngModel)]="form.chaserSummit" 
            type="text" id="summitInput" 
            (ionChange)="this.summitCheck($event)" 
            clear-input="true"
            placeholder="Chaser Summit">
          </ion-input>
          <ng-template #otherLog>
            <ion-input
              [(ngModel)]="form.activatorSummit" 
              type="text" id="summitInput" 
              (ionChange)="this.summitCheck($event)" 
              clear-input="true"
              placeholder="Summit Reference">
            </ion-input>
          </ng-template>
        </ion-col>
        <ion-col>
          <div>
            <ion-select [(ngModel)]="form.mode" placeholder="Mode">
              <ion-select-option *ngFor="let mode of settings.modes" value="{{ mode }}">{{ mode }}</ion-select-option>
            </ion-select>
          </div>
        </ion-col>
      </ion-row>
      <ion-row class="ion-align-items-stretch">
        <ion-col>
          <div>
            <input 
              [(ngModel)]="form.band" 
              type="number" 
              clear-input="true"
              placeholder="MHz">
          </div>
        </ion-col>
        <ion-col>
          <div>
            <ion-input 
              [(ngModel)]="form.call" 
              (ionChange)="this.callCheck($event)"
              type="textVisiblePassword" 
              placeholder="Callsign">
            </ion-input>
          </div>
        </ion-col>
     </ion-row>
     <ion-row class="ion-align-items-stretch">
        <ion-col>
          <div>
            <input [(ngModel)]="form.rstGiven" type="number" placeholder="RST TX">
          </div>
        </ion-col>
        <ion-col>
          <div>
            <input [(ngModel)]="form.rstReceived" type="number" placeholder="RST RX">
          </div>
        </ion-col>
     </ion-row>

      <ion-row class="ion-align-items-stretch">
        <ion-col>
          <div>
            <input [(ngModel)]="form.comment" type="text" placeholder="Comment">
          </div>
        </ion-col>
      </ion-row>
      <ion-row *ngIf="showS2sField">
        <ion-col>
          <ion-input 
            [(ngModel)]="form.chaserSummit" 
            type="text" 
            id="s2sInput" 
            (ionChange)="this.summitCheck($event)" 
            placeholder="S2S Summit Reference">
          </ion-input>
        </ion-col>
      </ion-row>
      <ion-row>
        <ion-col size="8">
          <ion-segment scrollable [(ngModel)]="logType" (ionChange)="changeType($event)">
	    <ion-segment-button value="Activator">
	      <ion-label>Act</ion-label>
	    </ion-segment-button>
	    <ion-segment-button value="Summit2Summit">
	      <ion-label>S2S</ion-label>
	    </ion-segment-button>
	    <ion-segment-button value="Chaser">
	      <ion-label>Cha</ion-label>
	    </ion-segment-button>
	  </ion-segment> 
        </ion-col>
        <ion-col size="4"> 
          <ion-button color="secondary" expand="block" shape="round" strong="true" (click)="logQso()">
            Add QSO
          </ion-button>
        </ion-col>
      </ion-row>
    </ion-grid>
  </ion-card-content>
</ion-card>
<ion-content>
  <ion-list>
    <ion-list-header>
      Recent QSOs
    </ion-list-header>

    <ion-item *ngFor="let qso of settings.recentQsos; let i = index">
      <ion-label>
        <h2>{{qso.time}} &nbsp; <strong>{{qso.call}}</strong> </h2>
      </ion-label>
      <ion-button (click)="showEditDialog(i)" color="tertiary" shape="round">edit</ion-button>
      <ion-button (click)="deleteQso(i)" color="danger" shape="round">delete</ion-button>
    </ion-item>
  </ion-list>

</ion-content>
