<ion-header>
  <ion-toolbar>
    <ion-title>Previous Contacts</ion-title>
  </ion-toolbar>
</ion-header>

<ion-content>
  <ion-list>
    <ion-item-sliding *ngFor="let callsign of callsigns">
      <ion-item>
        {{ callsign.call }}&nbsp;
        <ion-text color="medium">{{ callsign.comment }}</ion-text>
      </ion-item>
      <ion-item-options side="start">
        <ion-item-option color="primary" (click)="editCall(callsign, $event)">
          <ion-icon name="open"></ion-icon>&nbsp;Edit
        </ion-item-option>
      </ion-item-options>
      <ion-item-options side="end">
        <ion-item-option color="danger" (click)="delete(callsign)">
          <ion-icon name="trash"></ion-icon>&nbsp;Delete
        </ion-item-option>
      </ion-item-options>
   </ion-item-sliding>
  </ion-list>
  <ion-fab vertical="bottom" horizontal="end">
    <ion-fab-button>
      <ion-icon name="ellipsis-horizontal-outline"></ion-icon>
    </ion-fab-button>
    <ion-fab-list side="top">
      <ion-fab-button color="primary" (click)="newCall()" >
        <ion-icon name="add"></ion-icon>
      </ion-fab-button>
      <ion-fab-button color="primary" (click)="uploadList()" >
        <ion-icon name="cloud-upload-outline"></ion-icon>
      </ion-fab-button>
      <ion-fab-button color="primary" (click)="downloadList()" >
        <ion-icon name="cloud-download-outline"></ion-icon>
      </ion-fab-button>
    </ion-fab-list>
  </ion-fab>
</ion-content>
